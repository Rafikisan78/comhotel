<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G20 Pulse — Actualités en temps réel</title>
  <meta name="description" content="Suivez les actualités des 20 plus grandes économies mondiales, mises à jour quotidiennement.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a2e;
      --bg-card-hover: #222240;
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b8;
      --text-muted: #6b6b80;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --accent-glow: rgba(108, 92, 231, 0.3);
      --border: #2a2a3e;
      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #e17055;
      --cat-politique: #e17055;
      --cat-economie: #00b894;
      --cat-technologie: #6c5ce7;
      --cat-societe: #fdcb6e;
      --cat-environnement: #00cec9;
      --cat-securite: #d63031;
      --cat-diplomatie: #0984e3;
      --cat-culture: #e84393;
      --cat-energie: #f39c12;
      --cat-sante: #55efc4;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 800;
      color: white;
    }

    .logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo span {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: block;
      margin-top: -2px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
      margin-right: 6px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,184,148,0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(0,184,148,0); }
    }

    /* Country Navigation */
    .country-nav {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 2rem;
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .country-nav::-webkit-scrollbar { height: 4px; }
    .country-nav::-webkit-scrollbar-track { background: transparent; }
    .country-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .country-list {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
      flex-wrap: nowrap;
    }

    .country-btn {
      flex-shrink: 0;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
    }

    .country-btn:hover {
      border-color: var(--accent);
      color: var(--text-primary);
      background: rgba(108,92,231,0.1);
    }

    .country-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }

    .country-flag { font-size: 1.1rem; }

    /* Main Content */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .country-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .country-header .flag { font-size: 2.5rem; }

    .country-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .country-header .count {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* News Grid */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 1.5rem;
    }

    @media (max-width: 860px) {
      .news-grid { grid-template-columns: 1fr; }
      .header-inner { flex-direction: column; align-items: flex-start; }
      .main { padding: 1rem; }
    }

    /* News Card */
    .news-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .news-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(108,92,231,0.15);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .card-category {
      padding: 0.25rem 0.7rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .card-importance {
      display: flex;
      gap: 3px;
    }

    .importance-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
    }

    .importance-dot.filled { background: var(--accent-light); }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text-primary);
    }

    .card-summary {
      font-size: 0.85rem;
      line-height: 1.65;
      color: var(--text-secondary);
    }

    .card-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .tag {
      padding: 0.2rem 0.6rem;
      background: rgba(108,92,231,0.1);
      border: 1px solid rgba(108,92,231,0.2);
      border-radius: 4px;
      font-size: 0.7rem;
      color: var(--accent-light);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .card-source { font-weight: 500; }

    /* YouTube Embed */
    .card-video {
      border-radius: var(--radius-sm);
      overflow: hidden;
      aspect-ratio: 16/9;
      background: var(--bg-secondary);
    }

    .card-video iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .card-video-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* Loading State */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 1.5rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Empty / Error State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state h3 { color: var(--text-secondary); margin-bottom: 0.5rem; }

    /* Category Colors */
    .cat-politique { background: rgba(225,112,85,0.15); color: var(--cat-politique); }
    .cat-economie { background: rgba(0,184,148,0.15); color: var(--cat-economie); }
    .cat-technologie { background: rgba(108,92,231,0.15); color: var(--cat-technologie); }
    .cat-societe { background: rgba(253,203,110,0.15); color: var(--cat-societe); }
    .cat-environnement { background: rgba(0,206,201,0.15); color: var(--cat-environnement); }
    .cat-securite { background: rgba(214,48,49,0.15); color: var(--cat-securite); }
    .cat-diplomatie { background: rgba(9,132,227,0.15); color: var(--cat-diplomatie); }
    .cat-culture { background: rgba(232,67,147,0.15); color: var(--cat-culture); }
    .cat-energie { background: rgba(243,156,18,0.15); color: var(--cat-energie); }
    .cat-sante { background: rgba(85,239,196,0.15); color: var(--cat-sante); }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">G20</div>
        <div>
          <h1>G20 Pulse</h1>
          <span>Actualités des 20 plus grandes économies</span>
        </div>
      </div>
      <div class="header-meta">
        <div><span class="live-dot"></span> Mise à jour quotidienne</div>
        <div id="lastUpdate">Chargement...</div>
      </div>
    </div>
  </header>

  <!-- Country Navigation -->
  <nav class="country-nav">
    <div class="country-list" id="countryList"></div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <div class="country-header" id="countryHeader">
      <span class="flag" id="countryFlag"></span>
      <h2 id="countryTitle"></h2>
      <span class="count" id="newsCount"></span>
    </div>
    <div id="newsContainer">
      <div class="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">Chargement des actualités...</div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    G20 Pulse &mdash; Actualités agrégées automatiquement via IA &bull; Données mises à jour quotidiennement à 06h00 UTC
  </footer>

  <script>
    // ========== CONFIGURATION ==========
    const SUPABASE_URL = 'https://qbmmmkceevwbifvwnlfx.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_O8x2fztv-Q5jZk6n7AUEtQ_CXBijKcG';

    // ========== PAYS G20 ==========
    const G20_COUNTRIES = [
      { code: 'US', name: 'États-Unis', flag: '\u{1F1FA}\u{1F1F8}' },
      { code: 'CN', name: 'Chine', flag: '\u{1F1E8}\u{1F1F3}' },
      { code: 'JP', name: 'Japon', flag: '\u{1F1EF}\u{1F1F5}' },
      { code: 'DE', name: 'Allemagne', flag: '\u{1F1E9}\u{1F1EA}' },
      { code: 'FR', name: 'France', flag: '\u{1F1EB}\u{1F1F7}' },
      { code: 'GB', name: 'Royaume-Uni', flag: '\u{1F1EC}\u{1F1E7}' },
      { code: 'IN', name: 'Inde', flag: '\u{1F1EE}\u{1F1F3}' },
      { code: 'BR', name: 'Brésil', flag: '\u{1F1E7}\u{1F1F7}' },
      { code: 'IT', name: 'Italie', flag: '\u{1F1EE}\u{1F1F9}' },
      { code: 'CA', name: 'Canada', flag: '\u{1F1E8}\u{1F1E6}' },
      { code: 'KR', name: 'Corée du Sud', flag: '\u{1F1F0}\u{1F1F7}' },
      { code: 'RU', name: 'Russie', flag: '\u{1F1F7}\u{1F1FA}' },
      { code: 'AU', name: 'Australie', flag: '\u{1F1E6}\u{1F1FA}' },
      { code: 'MX', name: 'Mexique', flag: '\u{1F1F2}\u{1F1FD}' },
      { code: 'ID', name: 'Indonésie', flag: '\u{1F1EE}\u{1F1E9}' },
      { code: 'SA', name: 'Arabie Saoudite', flag: '\u{1F1F8}\u{1F1E6}' },
      { code: 'TR', name: 'Turquie', flag: '\u{1F1F9}\u{1F1F7}' },
      { code: 'AR', name: 'Argentine', flag: '\u{1F1E6}\u{1F1F7}' },
      { code: 'ZA', name: 'Afrique du Sud', flag: '\u{1F1FF}\u{1F1E6}' },
      { code: 'EU', name: 'Union Européenne', flag: '\u{1F1EA}\u{1F1FA}' }
    ];

    // ========== STATE ==========
    let newsCache = {};
    let currentCountry = 'US';

    // ========== INIT ==========
    document.addEventListener('DOMContentLoaded', () => {
      renderCountryNav();
      loadNews();
    });

    // ========== FETCH DATA FROM SUPABASE ==========
    async function loadNews() {
      showLoading();
      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/g20_news_cache?id=eq.g20_daily_news&select=data,updated_at`,
          {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
          }
        );

        if (response.ok) {
          const rows = await response.json();
          if (rows.length > 0 && rows[0].data && Object.keys(rows[0].data).length > 0) {
            newsCache = rows[0].data;
            const updatedAt = new Date(rows[0].updated_at);
            document.getElementById('lastUpdate').textContent =
              `MAJ : ${updatedAt.toLocaleDateString('fr-FR')} à ${updatedAt.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}`;
            renderNews();
            return;
          }
        }
        showEmpty('Aucune donnée disponible', 'Les actualités seront disponibles après la première exécution du workflow n8n.');
      } catch (err) {
        console.error('Erreur chargement:', err);
        showEmpty('Erreur de connexion', 'Impossible de charger les données depuis Supabase. Vérifiez votre connexion.');
      }
    }

    // ========== RENDER COUNTRY NAV ==========
    function renderCountryNav() {
      const container = document.getElementById('countryList');
      container.innerHTML = G20_COUNTRIES.map(c => `
        <button class="country-btn ${c.code === currentCountry ? 'active' : ''}"
                onclick="selectCountry('${c.code}')" data-code="${c.code}">
          <span class="country-flag">${c.flag}</span>
          ${c.name}
        </button>
      `).join('');
    }

    // ========== SELECT COUNTRY ==========
    function selectCountry(code) {
      currentCountry = code;
      document.querySelectorAll('.country-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.code === code);
      });
      renderNews();

      // Scroll active button into view
      const activeBtn = document.querySelector(`.country-btn[data-code="${code}"]`);
      if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    // ========== RENDER NEWS ==========
    function renderNews() {
      const country = G20_COUNTRIES.find(c => c.code === currentCountry);
      const articles = newsCache[currentCountry] || [];

      // Update header
      document.getElementById('countryFlag').textContent = country.flag;
      document.getElementById('countryTitle').textContent = country.name;
      document.getElementById('newsCount').textContent = `${articles.length} article${articles.length > 1 ? 's' : ''}`;

      if (articles.length === 0) {
        showEmpty('Aucune actualité', `Pas encore de données pour ${country.name}. Le prochain cycle de mise à jour les ajoutera.`);
        return;
      }

      // Sort by importance (descending)
      const sorted = [...articles].sort((a, b) => (b.importance || 0) - (a.importance || 0));

      const container = document.getElementById('newsContainer');
      container.innerHTML = `<div class="news-grid">${sorted.map(renderCard).join('')}</div>`;
    }

    // ========== RENDER SINGLE CARD ==========
    function renderCard(article) {
      const catClass = 'cat-' + (article.category || 'politique').toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z]/g, '');

      const importanceDots = Array.from({ length: 5 }, (_, i) =>
        `<span class="importance-dot ${i < (article.importance || 0) ? 'filled' : ''}"></span>`
      ).join('');

      const tags = (article.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

      const videoHtml = article.youtube_video_id
        ? `<div class="card-video">
            <iframe src="https://www.youtube.com/embed/${article.youtube_video_id}"
                    title="${article.title}" allowfullscreen loading="lazy"></iframe>
           </div>`
        : '';

      return `
        <article class="news-card">
          <div class="card-top">
            <span class="card-category ${catClass}">${article.category || 'Actualité'}</span>
            <div class="card-importance" title="Importance: ${article.importance || 0}/5">
              ${importanceDots}
            </div>
          </div>
          <h3 class="card-title">${escapeHtml(article.title || '')}</h3>
          <p class="card-summary">${escapeHtml(article.summary || '')}</p>
          ${videoHtml}
          <div class="card-tags">${tags}</div>
          <div class="card-footer">
            <span class="card-source">${escapeHtml(article.source || '')}</span>
            <span>${article.date || ''}</span>
          </div>
        </article>
      `;
    }

    // ========== HELPERS ==========
    function showLoading() {
      document.getElementById('newsContainer').innerHTML = `
        <div class="loading-container">
          <div class="spinner"></div>
          <div class="loading-text">Chargement des actualités...</div>
        </div>`;
    }

    function showEmpty(title, message) {
      document.getElementById('newsContainer').innerHTML = `
        <div class="empty-state">
          <div class="icon">📰</div>
          <h3>${title}</h3>
          <p>${message}</p>
        </div>`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Auto-refresh every 10 minutes
    setInterval(loadNews, 10 * 60 * 1000);
  </script>
</body>
</html>
